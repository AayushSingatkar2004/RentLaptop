name: laptop_rental_admin
description: Laptop Rental Service — Admin Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ Explicitly add this (prevents intl conflicts)
  flutter_localizations:
    sdk: flutter

  # ── Supabase ───────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── State Management ───────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ─────────────────────────────────────────────
  go_router: ^13.2.0

  # ── UI / UX ────────────────────────────────────────────────
  flutter_slidable: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  table_calendar: ^3.1.0
  intl: ^0.20.2   # ✅ Must match Flutter SDK pin
  gap: ^3.0.1

  # ── Forms & Validation ─────────────────────────────────────
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.2

  # ── Misc ───────────────────────────────────────────────────
  uuid: ^4.4.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true